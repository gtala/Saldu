# Fragmento para incluir DENTRO del bloque server { ... } que ya sirve n8n en el puerto 80.
# Ruta pública: http://TU_IP/gastos-preview/
# Ajustá la ruta del archivo principal de Nginx si tu distro usa otro sitio (sites-available, etc.).

location /gastos-preview/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3847/;
}

# Tras editar:
#   sudo nginx -t && sudo systemctl reload nginx
